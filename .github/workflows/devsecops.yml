name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-security-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: vibe2ship_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: './backend/requirements.txt'
        
    - name: Install System Dependencies
      run: sudo apt-get update && sudo apt-get install -y libmagic1

    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black ruff pytest pip-audit
        
    - name: Secret Scan (TruffleHog)
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ""
        head: ${{ github.ref_name }}
        extra_args: --debug --only-verified

    - name: Dependency Scan (pip-audit)
      working-directory: ./backend
      run: pip-audit -r requirements.txt
      
    - name: Format Check (Black)
      working-directory: ./backend
      run: black --check .
      continue-on-error: true
      
    - name: Linter (Ruff)
      working-directory: ./backend
      run: ruff check .
      
    - name: Run Pytest
      working-directory: ./backend
      run: |
        alembic upgrade head
        pytest -v > pytest.log || true
        cat pytest.log
        if grep -q "FAILED" pytest.log || grep -q "ERRORS" pytest.log; then exit 1; fi
      env:
        PYTHONPATH: .
        DATABASE_URL: postgresql+psycopg2://postgres:password@localhost:5432/vibe2ship_test
        TEST_DATABASE_URL: postgresql+psycopg2://postgres:password@localhost:5432/vibe2ship_test
        JWT_SECRET: mock_jwt_secret_key_mock_jwt_secret_key

    - name: Upload Pytest Log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-devsecops-log
        path: backend/pytest.log

  frontend-security-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Frontend Linter (ESLint)
      working-directory: ./frontend
      run: npm run lint
      
    - name: TypeScript Build Check
      working-directory: ./frontend
      run: npm run build
      
    - name: Frontend Test
      working-directory: ./frontend
      run: npm test

    - name: Dependency Scan (npm audit)
      working-directory: ./frontend
      run: npm audit --audit-level=high || true
      
  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python' ]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  docker-build:
    needs: [backend-security-and-test, frontend-security-and-test, codeql-analysis]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Backend Docker Image
      working-directory: ./backend
      run: docker build -t vibe2ship-backend:latest .
      
    - name: Build Frontend Docker Image
      working-directory: ./frontend
      run: docker build -t vibe2ship-frontend:latest .
