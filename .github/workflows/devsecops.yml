name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-security-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black ruff pytest pip-audit
        
    - name: Secret Scan (TruffleHog)
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ""
        head: ${{ github.ref_name }}
        extra_args: --debug --only-verified

    - name: Dependency Scan (pip-audit)
      working-directory: ./backend
      run: pip-audit
      
    - name: Format Check (Black)
      working-directory: ./backend
      run: black --check .
      
    - name: Linter (Ruff)
      working-directory: ./backend
      run: ruff check .
      
    - name: Run Pytest
      working-directory: ./backend
      run: pytest

  frontend-security-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Frontend Linter (ESLint)
      working-directory: ./frontend
      run: npm run lint
      
    - name: TypeScript Build Check
      working-directory: ./frontend
      run: npm run build
      
    - name: Dependency Scan (npm audit)
      working-directory: ./frontend
      run: npm audit --audit-level=high
      
  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript, python
        
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  docker-build:
    needs: [backend-security-and-test, frontend-security-and-test, codeql-analysis]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Backend Docker Image
      working-directory: ./backend
      run: docker build -t vibe2ship-backend:latest .
      
    - name: Build Frontend Docker Image
      working-directory: ./frontend
      run: docker build -t vibe2ship-frontend:latest .
