name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: vibe2ship_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Lint Frontend
      working-directory: ./frontend
      run: npm run lint

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

    - name: Test Frontend
      working-directory: ./frontend
      run: npm test

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: './backend/requirements.txt'

    - name: Install System Dependencies
      run: sudo apt-get update && sudo apt-get install -y libmagic1

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff pytest

    - name: Lint Backend
      working-directory: ./backend
      run: ruff check .

    - name: Test Backend
      working-directory: ./backend
      run: |
        alembic upgrade head
        pytest -v
      env:
        PYTHONPATH: .
        DATABASE_URL: postgresql+psycopg2://postgres:password@localhost:5432/vibe2ship_test
        TEST_DATABASE_URL: postgresql+psycopg2://postgres:password@localhost:5432/vibe2ship_test
