<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Community Hero AI - An AI-powered civic issue reporting and management platform."
    />
    <link rel="canonical" href="https://communityhero.ai/" />
    <link rel="alternate" hreflang="en" href="https://communityhero.ai/" />
    <link rel="manifest" href="/manifest.json" />
    <title>Community Hero AI</title>
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          font-family: sans-serif;
          background-color: #0f172a;
          color: white;
        }
        .spinner {
          border: 4px solid rgba(255, 255, 255, 0.1);
          border-left-color: #3b82f6;
          border-radius: 50%;
          width: 40px;
          height: 40px;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          0% {
            transform: rotate(0deg);
          }
          100% {
            transform: rotate(360deg);
          }
        }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
